<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Video Downloader</title>
    <meta name="description" content="Download YouTube videos and get direct MP4 links for VRChat and other platforms." />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="YouTube Video Downloader" />
    <meta property="og:description" content="Download YouTube videos and get direct MP4 links for VRChat and other platforms." />
    <meta property="og:site_name" content="YouTube Video Downloader" />

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>YouTube Video Downloader</h1>
        <p class="subtitle">Download videos for VRChat and more</p>
      </header>

      <section class="download-form">
        <form id="downloadForm">
          <div class="input-group">
            <input
              type="url"
              id="urlInput"
              placeholder="Paste YouTube URL here..."
              required
              autocomplete="off"
            />
            <button type="submit" id="submitBtn">Download</button>
          </div>
        </form>
      </section>

      <section id="progressSection" class="progress-section hidden">
        <div class="card">
          <h3 id="progressTitle">Starting download...</h3>
          <div class="status-row">
            <span class="status-badge" id="statusBadge">pending</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </section>

      <section id="resultSection" class="result-section hidden">
        <div class="card result-card">
          <h3 id="resultTitle">Video Ready</h3>
          <div class="link-group">
            <label>Direct Link</label>
            <div class="copy-row">
              <input type="text" id="directLink" readonly />
              <button class="copy-btn" data-target="directLink" type='button'>Copy</button>
            </div>
          </div>
          <p class="expires-text" id="expiresText"></p>
        </div>
      </section>

      <section id="errorSection" class="error-section hidden">
        <div class="card error-card">
          <h3>Download Failed</h3>
          <p id="errorMessage"></p>
        </div>
      </section>

      <section class="recent-section">
        <h2>Recent Downloads</h2>
        <div id="recentList" class="recent-list">
          <p class="empty-state">No downloads yet</p>
        </div>
      </section>

      <footer>
        <div class="footer-divider"></div>
        <div class="footer-content">
          <p class="footer-hosted">
            Hosted with <span class="heart">&hearts;</span> in the
            <span class="eu-flag">EU</span>
          </p>
          <p class="footer-disclaimer">
            Videos are automatically deleted after
            <strong><span id="ttlValue">--</span>h</strong>
          </p>
          <div class="footer-links">
            <a href="https://github.com/headpatcloud/youtube-redirect-downloader" target="_blank" rel="noopener noreferrer">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
              Source
            </a>
          </div>
        </div>
      </footer>
    </div>

    <script src="/app.js?v=3"></script>
  </body>
</html>
